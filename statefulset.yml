---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-sql
  labels:
    app: mydb
spec:
  serviceName: my-sql
  replicas: 2
  selector:
    matchLabels:
      app: mydb
  template:
    metadata:
      labels:
        app: mydb
    spec:
      containers:
        - name: sql-container
          image: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: Vinnu2210
          volumeMounts:
            - name: sql-volume
              mountPath: /var/lib/mysql
      volumes:
        - name: sql-volume
          persistentVolumeClaim:
            claimName: my-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: my-sql
  labels:
    app: mydb
    created-by: vinay
spec:
  clusterIP: None
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mydb
...
